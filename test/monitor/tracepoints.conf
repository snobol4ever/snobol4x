# tracepoints.conf — default trace-point and ignore-point rules
#
# INCLUDE/EXCLUDE apply to variables (VALUE trace) and functions (CALL+RETURN trace).
# Rules are evaluated top-to-bottom; first match wins.
# Patterns are Python regular expressions matched against the name.
#
# Scope qualifiers:
#   name          matches any variable or function named 'name' anywhere
#   func/var      matches variable 'var' only inside function 'func'
#   (planned) {global}/var  matches module-scope global 'var' only
#
# TRACE kinds injected:
#   variable matched by INCLUDE  ->  TRACE(var, 'VALUE')
#   function matched by INCLUDE  ->  TRACE(fn, 'CALL') + TRACE(fn, 'RETURN')
#
# IGNORE rules suppress known-divergent lines from the diff without removing
# them from the stream.  Pattern is a Python regex matched against the value.

# --- INCLUDE (default: everything) ---
INCLUDE  .*           # all variables found on LHS of assignment
INCLUDE  .*           # all DEFINE'd functions: CALL + RETURN

# --- EXCLUDE (non-deterministic / always-divergent) ---
EXCLUDE  &RANDOM      # non-deterministic
EXCLUDE  &TIME        # wall-clock
EXCLUDE  &DATE        # wall-clock
EXCLUDE  &STNO        # statement numbers differ by dialect — exclude from injection
EXCLUDE  &STCOUNT     # increments differently per dialect
EXCLUDE  &STEXEC      # CSNOBOL4-only keyword

# --- IGNORE (present in stream but not counted as divergence) ---
# Format: IGNORE  <name-regex>  <value-regex>
IGNORE   &TERMINAL    tty\d+          # tty02 vs tty05 — session artifact
IGNORE   DATATYPE\(   [a-z]+|[A-Z]+  # SPITBOL lowercase vs CSNOBOL4 uppercase
# OUTPUT case divergence (CSNOBOL4 uppercase, SPITBOL lowercase) is handled by
# case-folding variable names in normalize_trace.py — no IGNORE rule needed.
