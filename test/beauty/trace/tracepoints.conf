# trace subsystem tracepoints
# Exclude TABLE variables — display format differs between dialects:
#   CSNOBOL4: TABLE(10,10)  SPITBOL: (undef)  ASM: TABLE
EXCLUDE  t8map2
EXCLUDE  t8max2b
# Exclude dialect-probe variables — their values differ by design
EXCLUDE  dstring
EXCLUDE  dname
INCLUDE  .*
EXCLUDE  &RANDOM
EXCLUDE  &TIME
EXCLUDE  &DATE
EXCLUDE  &STNO
EXCLUDE  &STCOUNT
EXCLUDE  &STEXEC
EXCLUDE  &.*
IGNORE   &TERMINAL    tty\d+
IGNORE   DATATYPE\(   [a-z]+|[A-Z]+
