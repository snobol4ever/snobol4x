# tree subsystem tracepoints
# Exclude variables holding ARRAY/DATA objects — display format differs between
# CSNOBOL4 ("ARRAY('1:2')") and ASM runtime ("ARRAY").
EXCLUDE  kids
EXCLUDE  nd
EXCLUDE  ch1
EXCLUDE  ch2
EXCLUDE  leaf
EXCLUDE  leaf2
INCLUDE  .*
EXCLUDE  &RANDOM
EXCLUDE  &TIME
EXCLUDE  &DATE
EXCLUDE  &STNO
EXCLUDE  &STCOUNT
EXCLUDE  &STEXEC
EXCLUDE  &.*
IGNORE   &TERMINAL    tty\d+
IGNORE   DATATYPE\(   [a-z]+|[A-Z]+
