# counter subsystem tracepoints
# Exclude dummy — discard variable, NRETURN NAME semantics differ
EXCLUDE  dummy
INCLUDE  .*
EXCLUDE  &RANDOM
EXCLUDE  &TIME
EXCLUDE  &DATE
EXCLUDE  &STNO
EXCLUDE  &STCOUNT
EXCLUDE  &STEXEC
EXCLUDE  &.*
IGNORE   &TERMINAL    tty\d+
IGNORE   DATATYPE\(   [a-z]+|[A-Z]+
