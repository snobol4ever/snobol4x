# match subsystem tracepoints
# TxInList is a pattern-typed variable — SPITBOL traces it as '(undef)',
# CSNOBOL4+ASM as 'PATTERN'. Exclude to suppress known representation divergence.
INCLUDE  .*
EXCLUDE  &RANDOM
EXCLUDE  &TIME
EXCLUDE  &DATE
EXCLUDE  &STNO
EXCLUDE  &STCOUNT
EXCLUDE  &STEXEC
EXCLUDE  &.*
EXCLUDE  TxInList
EXCLUDE  wList
